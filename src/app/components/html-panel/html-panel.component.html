<app-panel
  eyebrow="Editor"
  title="HTML"
  badge="Markup"
  accentClass="text-emerald-600"
  badgeClass="border-emerald-200 bg-emerald-50 text-emerald-700"
  [hasError]="!!error()"
>
  <app-input
    inputId="html-input"
    ariaLabel="HTML editor"
    placeholder="&lt;section&gt;&#10;  &lt;h1&gt;Hello world&lt;/h1&gt;&#10;&lt;/section&gt;"
    tintClass="focus:border-emerald-300 focus:bg-white focus:ring-4 focus:ring-emerald-100"
    [value]="html()"
    [error]="error()"
    (valueChange)="updateHtml($event)"
  />
</app-panel>
