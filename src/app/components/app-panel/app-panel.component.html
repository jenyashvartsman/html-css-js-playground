<section
  class="flex h-full min-h-0 flex-col rounded-2xl border border-slate-200 bg-white transition"
  [class.border-rose-300]="hasError()"
  [class.bg-rose-50/40]="hasError()"
>
  <header
    class="flex items-center justify-between border-b border-slate-200 px-4 py-3 transition"
    [class.border-rose-200]="hasError()"
  >
    <div>
      <p
        class="text-xs font-semibold uppercase tracking-[0.2em]"
        [class]="accentClass()"
        [class.text-rose-700]="hasError()"
      >
        {{ eyebrow() }}
      </p>
      <h2 class="text-sm font-semibold text-slate-900">{{ title() }}</h2>
    </div>

    <span
      class="rounded-full border px-2 py-1 text-[11px] font-medium"
      [class]="badgeClass()"
      [class.border-rose-200]="hasError()"
      [class.bg-rose-100]="hasError()"
      [class.text-rose-700]="hasError()"
    >
      {{ badge() }}
    </span>
  </header>

  <div class="flex flex-1 min-h-0 flex-col p-4">
    <ng-content />
  </div>
</section>
