<app-panel
  eyebrow="Editor"
  title="JavaScript"
  badge="Logic"
  accentClass="text-amber-600"
  badgeClass="border-amber-200 bg-amber-50 text-amber-700"
  [hasError]="!!error()"
>
  <app-input
    inputId="js-input"
    ariaLabel="JavaScript editor"
    placeholder="const heading = document.querySelector('h1');&#10;console.log(heading);"
    tintClass="focus:border-amber-300 focus:bg-white focus:ring-4 focus:ring-amber-100"
    [value]="js()"
    [error]="error()"
    (valueChange)="updateJs($event)"
  />
</app-panel>
