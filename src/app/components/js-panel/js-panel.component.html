<section
  class="flex h-full min-h-0 flex-col rounded-2xl border border-slate-200 bg-white transition"
  [class.border-rose-300]="!!error()"
  [class.bg-rose-50/40]="!!error()"
>
  <header
    class="flex items-center justify-between border-b border-slate-200 px-4 py-3 transition"
    [class.border-rose-200]="!!error()"
  >
    <div>
      <p class="text-xs font-semibold uppercase tracking-[0.2em] text-amber-600">
        Editor
      </p>
      <h2 class="text-sm font-semibold text-slate-900">JavaScript</h2>
    </div>
    <span
      class="rounded-full border border-amber-200 bg-amber-50 px-2 py-1 text-[11px] font-medium text-amber-700"
      [class.border-rose-200]="!!error()"
      [class.bg-rose-100]="!!error()"
      [class.text-rose-700]="!!error()"
    >
      Logic
    </span>
  </header>

  <div class="flex flex-1 min-h-0 flex-col p-4">
    <label class="sr-only" for="js-input">JavaScript editor</label>
    <textarea
      id="js-input"
      class="min-h-[240px] w-full flex-1 resize-none rounded-xl border border-slate-200 bg-slate-50/80 px-4 py-3 text-sm leading-6 text-slate-800 outline-none transition focus:border-amber-300 focus:bg-white focus:ring-4 focus:ring-amber-100"
      [class.border-rose-300]="!!error()"
      [class.bg-rose-50]="!!error()"
      placeholder="const heading = document.querySelector('h1');&#10;console.log(heading);"
      spellcheck="false"
      [value]="js()"
      (input)="updateJs($event)"
    ></textarea>
    @if (error(); as jsError) {
      <p class="mt-2 px-1 text-xs font-medium leading-5 text-rose-600">
        {{ jsError }}
      </p>
    }
  </div>
</section>
