<app-panel
  eyebrow="Editor"
  title="CSS"
  badge="Styles"
  accentClass="text-sky-600"
  badgeClass="border-sky-200 bg-sky-50 text-sky-700"
  [hasError]="!!error()"
>
  <app-input
    inputId="css-input"
    ariaLabel="CSS editor"
    placeholder=".card {&#10;  padding: 1rem;&#10;  border-radius: 1rem;&#10;}"
    tintClass="focus:border-sky-300 focus:bg-white focus:ring-4 focus:ring-sky-100"
    [value]="css()"
    [error]="error()"
    (valueChange)="updateCss($event)"
  />
</app-panel>
