<section
  class="flex h-full min-h-0 flex-col rounded-2xl border border-slate-200 bg-white transition"
  [class.border-rose-300]="!!error()"
  [class.bg-rose-50/40]="!!error()"
>
  <header
    class="flex items-center justify-between border-b border-slate-200 px-4 py-3 transition"
    [class.border-rose-200]="!!error()"
  >
    <div>
      <p class="text-xs font-semibold uppercase tracking-[0.2em] text-sky-600">
        Editor
      </p>
      <h2 class="text-sm font-semibold text-slate-900">CSS</h2>
    </div>
    <span
      class="rounded-full border border-sky-200 bg-sky-50 px-2 py-1 text-[11px] font-medium text-sky-700"
      [class.border-rose-200]="!!error()"
      [class.bg-rose-100]="!!error()"
      [class.text-rose-700]="!!error()"
    >
      Styles
    </span>
  </header>

  <div class="flex flex-1 min-h-0 flex-col p-4">
    <label class="sr-only" for="css-input">CSS editor</label>
    <textarea
      id="css-input"
      class="min-h-[240px] w-full flex-1 resize-none rounded-xl border border-slate-200 bg-slate-50/80 px-4 py-3 text-sm leading-6 text-slate-800 outline-none transition focus:border-sky-300 focus:bg-white focus:ring-4 focus:ring-sky-100"
      [class.border-rose-300]="!!error()"
      [class.bg-rose-50]="!!error()"
      placeholder=".card {&#10;  padding: 1rem;&#10;  border-radius: 1rem;&#10;}"
      spellcheck="false"
      [value]="css()"
      (input)="updateCss($event)"
    ></textarea>
    @if (error(); as cssError) {
      <p class="mt-2 px-1 text-xs font-medium leading-5 text-rose-600">
        {{ cssError }}
      </p>
    }
  </div>
</section>
